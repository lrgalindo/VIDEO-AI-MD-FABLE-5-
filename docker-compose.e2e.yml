version: "3.8"

# ── Shared internal network ────────────────────────────────────────────────
networks:
  e2e-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  e2e-pgdata:
  e2e-minio-data:

# ── Fixed constants (referenced via ${VAR} in service env blocks) ──────────
# SHA256 and size of yolov8n.pt — edge container caches this file so
# ModelManager skips download and ultralytics loads real weights (no STUB).
x-yolo-sha256: &yolo-sha256 "f59b3d833e2ff32e194b5bb8e08d211dc7c5bdf144b90d2c8412c47ccfc83b36"
x-yolo-size:   &yolo-size   6549796

services:
  # ── (1) Postgres 17 + pg_partman + pgTAP ────────────────────────────────
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: traxia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - e2e-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d traxia"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - e2e-net

  # ── (2) Alembic migration ─────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/traxia
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - e2e-net

  # ── (3) E2E seed data ─────────────────────────────────────────────────────
  seed-e2e:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: postgres
    command: >
      psql -h postgres -U postgres -d traxia
           -v ON_ERROR_STOP=1
           -f /seed/seed_e2e.sql
    volumes:
      - ./tests/e2e/seed_e2e.sql:/seed/seed_e2e.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - e2e-net

  # ── (4) MinIO — local S3-compatible store (replaces R2 in E2E) ────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: e2e-access-key
      MINIO_ROOT_PASSWORD: e2e-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - e2e-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 10s
      retries: 15
    networks:
      - e2e-net

  # ── (5) MinIO bucket init ─────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 e2e-access-key e2e-secret-key &&
        mc mb --ignore-existing local/traxia-snapshots &&
        mc anonymous set download local/traxia-snapshots
      "
    networks:
      - e2e-net

  # ── (6) Cloud API ─────────────────────────────────────────────────────────
  cloud-api:
    build:
      context: .
      dockerfile: docker/cloud/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/traxia
      JWT_SECRET: e2e-smoke-test-secret-2026
      RTSP_ENCRYPTION_KEY: "eH0I7ppuNWkf394Y2143HGgWpkWhGr45Gwyj1DEvd_4="
      FAKE_MODEL_SERVE: "true"
      MODEL_BASE_URL: http://cloud-api:8000
      E2E_TEST_MODE: "true"
      # Real model SHA256 so ModelManager skips download if pre-cached in edge
      REAL_MODEL_SHA256: *yolo-sha256
      REAL_MODEL_SIZE: *yolo-size
      # Anthropic — passed from host env; Copilot check is skipped if unset
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL_COPILOT: "claude-haiku-4-5-20251001"
      ANTHROPIC_MODEL_AUDIT: "claude-sonnet-4-6"
      # MinIO as R2 replacement (internal endpoint for S3 API; public for presigned URLs)
      R2_ENDPOINT_URL: http://minio:9000
      R2_PUBLIC_ENDPOINT_URL: http://localhost:9000
      R2_ACCOUNT_ID: e2e-account
      R2_ACCESS_KEY_ID: e2e-access-key
      R2_SECRET_ACCESS_KEY: e2e-secret-key
      R2_BUCKET_SNAPSHOTS: traxia-snapshots
      R2_PRESIGN_TTL_SECONDS: "3600"
    ports:
      - "8000:8000"
    depends_on:
      seed-e2e:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - e2e-net

  # ── (7) httpbin — webhook target for action channel dispatch ──────────────
  httpbin:
    image: kennethreitz/httpbin
    ports:
      - "8088:80"
    networks:
      - e2e-net

  # ── (8) mediamtx RTSP server ──────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
    networks:
      - e2e-net

  # ── (9) ffmpeg: loop bus.jpg → RTSP (people detectable by YOLO/ByteTrack) ─
  ffmpeg-publisher:
    image: jrottenberg/ffmpeg:6.1-alpine
    depends_on:
      - mediamtx
    volumes:
      - ./tests/e2e/assets/bus.jpg:/bus.jpg:ro
    command:
      - -loop
      - "1"
      - -i
      - /bus.jpg
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -t
      - "7200"
      - -r
      - "10"
      - -an
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/test
    restart: on-failure
    networks:
      - e2e-net

  # ── (10) Edge Gateway — real ultralytics inference ────────────────────────
  edge-gateway:
    build:
      context: .
      dockerfile: docker/edge/Dockerfile.e2e
    environment:
      CLOUD_API_URL: http://cloud-api:8000
      GATEWAY_ID: e2e-gateway-001
      ACTIVATION_CODE: e2e-smoke-code-2026
      VERTICAL_TYPE: retail
      CAMERA_ID: d4e2e000-0000-0000-0000-000000000001
      RTSP_URLS: rtsp://mediamtx:8554/test
      CAPTURE_FPS: "3"
      CACHE_DIR: /tmp/e2e_model_cache
      TOKEN_FILE: /tmp/e2e_tokens.json
      QUEUE_DB: /tmp/e2e_queue.db
      QUEUE_RETENTION_DAYS: "7"
      BACKOFF_BASE_SECONDS: "0.5"
      BACKOFF_MAX_SECONDS: "30.0"
    volumes:
      # Pre-populate model cache — ModelManager finds it, verifies SHA256, loads YOLO
      # without downloading (no egress needed; real ultralytics inference from frame 1)
      - ./yolov8n.pt:/tmp/e2e_model_cache/yolo_retail_1.0.0.pt:ro
    depends_on:
      cloud-api:
        condition: service_healthy
      mediamtx:
        condition: service_started
      ffmpeg-publisher:
        condition: service_started
    networks:
      - e2e-net

  # ── (11) Dashboard — built SPA served by nginx ────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      cloud-api:
        condition: service_healthy
    networks:
      - e2e-net
